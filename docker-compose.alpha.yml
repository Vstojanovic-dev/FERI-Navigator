services:
  postgres:
    image: postgis/postgis:17-3.5
    container_name: feri-navigator-postgres-alpha
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-feri_navigator}
      POSTGRES_USER: ${DB_USERNAME:?DB_USERNAME is required}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
    expose:
      - "5432"
    volumes:
      - feri-db-data-alpha:/var/lib/postgresql/data
      - ./database/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${DB_USERNAME:?DB_USERNAME is required} -d ${POSTGRES_DB:-feri_navigator}"
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: feri-navigator-backend-alpha
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod}
      SERVER_PORT: 8080
      DB_URL: ${DB_URL:-jdbc:postgresql://postgres:5432/${POSTGRES_DB:-feri_navigator}}
      DB_USERNAME: ${DB_USERNAME:?DB_USERNAME is required}
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      APP_CORS_ALLOWED_ORIGINS: ${APP_CORS_ALLOWED_ORIGINS:?APP_CORS_ALLOWED_ORIGINS is required}
      APP_SHARE_BASE_URL: ${APP_SHARE_BASE_URL:?APP_SHARE_BASE_URL is required}
      APP_ADMIN_ENABLED: "false"
    expose:
      - "8080"
    volumes:
      - ./database/maps:/app/database/maps:ro
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/actuator/health/readiness"]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 5

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: feri-navigator-frontend-alpha
    restart: unless-stopped
    ports:
      - "127.0.0.1:8081:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  feri-db-data-alpha:
