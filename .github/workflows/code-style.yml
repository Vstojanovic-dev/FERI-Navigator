name: Service startup checks

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  startup-checks:
    name: Backend and frontend startup
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build and start services
        run: docker compose up -d --build

      - name: Wait for backend
        shell: bash
        run: |
          for i in {1..30}; do
            if curl -s -o /dev/null http://127.0.0.1:8080; then
              exit 0
            fi
            sleep 5
          done
          echo "Backend did not start on port 8080 in time."
          exit 1

      - name: Wait for frontend
        shell: bash
        run: |
          for i in {1..30}; do
            if curl -fsS http://127.0.0.1:5173 > /dev/null; then
              exit 0
            fi
            sleep 5
          done
          echo "Frontend did not start on port 5173 in time."
          exit 1

      - name: Show container status
        if: always()
        run: docker compose ps

      - name: Show logs on failure
        if: failure()
        run: docker compose logs --no-color

      - name: Stop services
        if: always()
        run: docker compose down -v
