services:
  postgres:
    image: postgis/postgis:17-3.5
    container_name: feri-navigator-postgres
    environment:
      POSTGRES_DB: feri_navigator
      POSTGRES_USER: feri
      POSTGRES_PASSWORD: feri
    ports:
      - "5432:5432"
    volumes:
      - feri-db-data:/var/lib/postgresql/data
      - ./database/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U feri -d feri_navigator"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: feri-navigator-backend
    environment:
      SPRING_PROFILES_ACTIVE: dev
      SERVER_PORT: 8080
      DB_URL: jdbc:postgresql://postgres:5432/feri_navigator
      DB_USERNAME: feri
      DB_PASSWORD: feri
      APP_CORS_ALLOWED_ORIGINS: http://localhost:5173,http://localhost:5174
      APP_SHARE_BASE_URL: http://localhost:5173
      APP_ADMIN_ENABLED: "true"
    ports:
      - "8080:8080"
    volumes:
      - ./database/maps:/app/database/maps:ro
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: feri-navigator-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  feri-db-data:
