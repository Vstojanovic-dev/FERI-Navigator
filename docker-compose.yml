services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: feri-navigator-backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/feri_navigator
      SPRING_DATASOURCE_USERNAME: feri
      SPRING_DATASOURCE_PASSWORD: feri
      SPRING_JPA_HIBERNATE_DDL_AUTO: validate
    ports:
      - "8080:8080"

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: feri-navigator-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  postgres_data:

volumes:
  feri-db-data: