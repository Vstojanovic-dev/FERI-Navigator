services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: feri-navigator-backend
    ports:
      - "8080:8080"

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: feri-navigator-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
